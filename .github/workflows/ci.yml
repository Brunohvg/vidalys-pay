name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vidalys_pay_test
          POSTGRES_USER: vidalys_pay_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=apps --cov-report=xml -v
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgresql://vidalys_pay_test:test_password@localhost:5432/vidalys_pay_test
          ALLOWED_HOSTS: localhost
          CSRF_TRUSTED_ORIGINS: http://localhost
          APP_BASE_URL: http://localhost:8000
          PAGARME_BASE_URL: https://sdx-api.pagar.me/core/v5
          PAGARME_SECRET_KEY: sk_test_fake
          PAGARME_WEBHOOK_BASIC_AUTH_USER: fake_webhook_user
          EVOLUTION_API_URL: http://localhost
          EVOLUTION_API_KEY: fake_key
          EVOLUTION_INSTANCE: fake_instance
          INVITATION_TOKEN_PEPPER: fake_pepper
          API_KEY_PEPPER: fake_pepper
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

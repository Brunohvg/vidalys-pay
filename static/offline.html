<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1b3d">
    <title>Sem conexão — Vidalys Pay</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--color-gray-50);
        }
        .offline-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            text-align: center;
        }
        .offline-icon {
            width: 120px;
            height: 120px;
            background: var(--color-gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--space-6);
        }
        .offline-icon svg {
            width: 64px;
            height: 64px;
            color: var(--color-gray-400);
        }
        .offline-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-navy-900);
            margin-bottom: var(--space-2);
        }
        .offline-text {
            font-size: var(--text-sm);
            color: var(--color-gray-500);
            margin-bottom: var(--space-8);
            max-width: 320px;
            line-height: 1.5;
        }
        .offline-features {
            display: flex;
            gap: var(--space-4);
            margin-bottom: var(--space-8);
            flex-wrap: wrap;
            justify-content: center;
        }
        .offline-feature {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--text-xs);
            color: var(--color-gray-500);
            background: var(--color-white);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }
        .offline-feature .icon {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="header__logo">
            <svg class="header__logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="url(#logo-gradient)"/>
                <path d="M8 20L12 12L16 18L20 10L24 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="logo-gradient" x1="0" y1="0" x2="32" y2="32">
                        <stop stop-color="#2563ff"/>
                        <stop offset="1" stop-color="#00d4ff"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="header__logo-text">Vidalys <span>Pay</span></span>
        </a>
        <span class="header__status" style="color: var(--color-warning);">offline</span>
    </header>

    <main class="offline-content">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>

        <h1 class="offline-title">Sem conexão</h1>
        <p class="offline-text">
            Você está offline. Verifique sua conexão com a internet e tente novamente.
        </p>

        <div class="offline-features">
            <div class="offline-feature">
                <span class="icon">📋</span>
                Histórico em cache
            </div>
            <div class="offline-feature">
                <span class="icon">🔒</span>
                Dados seguros
            </div>
        </div>

        <button onclick="window.location.reload()" class="btn-primary" style="width: auto; display: inline-flex; padding: 14px 32px;">
            Tentar novamente
        </button>
    </main>
</body>
</html>

<!-- icon-192.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1B3D"/>
      <stop offset="100%" stop-color="#0D2352"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Pulse ring -->
  <circle cx="96" cy="86" r="44" fill="none" stroke="#2563FF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="96" cy="86" r="52" fill="none" stroke="#00D4FF" stroke-width="0.8" opacity="0.1"/>
  <!-- V letter -->
  <text x="96" y="104" text-anchor="middle" font-family="'Satoshi','Inter',Arial,sans-serif" font-weight="800" font-size="72" fill="url(#accent)">V</text>
  <!-- Pay text -->
  <text x="96" y="145" text-anchor="middle" font-family="'Satoshi','Inter',Arial,sans-serif" font-weight="600" font-size="20" fill="#8792A6" letter-spacing="6">PAY</text>
  <!-- Accent dot -->
  <circle cx="145" cy="58" r="4" fill="#00C896"/>
</svg>
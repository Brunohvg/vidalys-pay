{% extends "sellers/app_base.html" %}
{% load static %}

{% block content %}
<h2 style="font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--space-5); color: var(--color-navy-900);">Calcular frete</h2>

<div class="card">
    <form id="freightForm">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label" for="destinationZip">CEP de destino</label>
            <input
                type="text"
                id="destinationZip"
                name="destination_zip_code"
                class="form-input"
                placeholder="00000-000"
                inputmode="numeric"
                maxlength="9"
                required
                autocomplete="postal-code"
            >
            <span class="form-hint" id="cepFeedback"></span>
        </div>

        <div class="form-group">
            <label class="form-label">Tipo de pacote</label>
            <div class="installments" role="radiogroup" aria-label="Tipo de pacote" id="presetGroup">
                {% for preset in presets %}
                <button
                    type="button"
                    class="option {% if forloop.first %}selected{% endif %}"
                    data-weight="{{ preset.weight_grams }}"
                    data-length="{{ preset.length_cm }}"
                    data-width="{{ preset.width_cm }}"
                    data-height="{{ preset.height_cm }}"
                    role="radio"
                    aria-checked="{% if forloop.first %}true{% else %}false{% endif %}"
                >{{ preset.name }}</button>
                {% endfor %}
            </div>
        </div>

        <div id="customFields" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="weight">Peso (gramas)</label>
                <input
                    type="number"
                    id="weight"
                    name="weight_grams"
                    class="form-input"
                    placeholder="Ex: 500"
                    min="1"
                    max="30000"
                    inputmode="numeric"
                >
                <span class="form-hint">Máximo 30 kg (30000 g)</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-3);">
                <div class="form-group">
                    <label class="form-label" for="length">Comprimento (cm)</label>
                    <input
                        type="number"
                        id="length"
                        name="length_cm"
                        class="form-input"
                        placeholder="Cm"
                        min="1"
                        max="105"
                        inputmode="decimal"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="width">Largura (cm)</label>
                    <input
                        type="number"
                        id="width"
                        name="width_cm"
                        class="form-input"
                        placeholder="Cm"
                        min="1"
                        max="105"
                        inputmode="decimal"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="height">Altura (cm)</label>
                    <input
                        type="number"
                        id="height"
                        name="height_cm"
                        class="form-input"
                        placeholder="Cm"
                        min="1"
                        max="105"
                        inputmode="decimal"
                    >
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="declaredValue">Valor declarado <span style="font-weight: 400; color: var(--color-gray-400);">(opcional)</span></label>
            <div class="money-input-wrapper">
                <span class="money-prefix">R$</span>
                <input
                    type="text"
                    id="declaredValue"
                    name="declared_value"
                    class="form-input money-input"
                    placeholder="0,00"
                    inputmode="decimal"
                >
            </div>
            <input type="hidden" id="declared_value_cents" name="declared_value_cents" value="0">
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
            <span class="btn-text">Calcular frete</span>
            <span class="spinner"></span>
        </button>
    </form>
</div>

<div id="formError" class="alert alert--danger" style="display: none;"></div>

<div id="resultArea" style="display: none; margin-top: var(--space-5);">
    <div id="destinationInfo" style="font-size: var(--text-sm); color: var(--color-gray-500); margin-bottom: var(--space-4);"></div>

    <div id="optionsContainer" style="display: flex; flex-direction: column; gap: var(--space-4);"></div>

    <div style="margin-top: var(--space-4); display: flex; gap: var(--space-3); flex-wrap: wrap;">
        <button type="button" class="btn-secondary" id="copySummaryBtn" style="flex: 1; min-width: 0;">
            Copiar resumo
        </button>
        <button type="button" class="btn-secondary" id="recalculateBtn" style="flex: 1; min-width: 0;">
            Calcular novamente
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('freightForm');
    const presetGroup = document.getElementById('presetGroup');
    const customFields = document.getElementById('customFields');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('formError');
    const resultArea = document.getElementById('resultArea');
    const destinationInfo = document.getElementById('destinationInfo');
    const optionsContainer = document.getElementById('optionsContainer');
    const copySummaryBtn = document.getElementById('copySummaryBtn');
    const recalculateBtn = document.getElementById('recalculateBtn');
    const cepFeedback = document.getElementById('cepFeedback');

    const zipInput = document.getElementById('destinationZip');
    const weightInput = document.getElementById('weight');
    const lengthInput = document.getElementById('length');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const declaredValue = document.getElementById('declaredValue');
    const declaredValueCents = document.getElementById('declared_value_cents');

    let lastResult = null;

    // Preset selection
    presetGroup.querySelectorAll('.option').forEach(btn => {
        btn.addEventListener('click', function() {
            presetGroup.querySelectorAll('.option').forEach(b => {
                b.classList.remove('selected');
                b.setAttribute('aria-checked', 'false');
            });
            this.classList.add('selected');
            this.setAttribute('aria-checked', 'true');

            if (this.dataset.weight === '0') {
                customFields.style.display = 'block';
            } else {
                customFields.style.display = 'none';
                weightInput.value = this.dataset.weight;
                lengthInput.value = this.dataset.length;
                widthInput.value = this.dataset.width;
                heightInput.value = this.dataset.height;
            }
        });
    });

    // CEP formatting
    zipInput.addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 8) val = val.slice(0, 8);
        if (val.length > 5) {
            e.target.value = val.slice(0, 5) + '-' + val.slice(5);
        } else {
            e.target.value = val;
        }
    });

    zipInput.addEventListener('blur', async function() {
        const cep = this.value.replace(/\D/g, '');
        if (cep.length !== 8) return;
        try {
            const resp = await fetch(`/api/v1/freight/calculate/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
                body: JSON.stringify({
                    destination_zip_code: cep,
                    weight_grams: 100,
                    length_cm: '20',
                    width_cm: '15',
                    height_cm: '2',
                }),
            });
            if (resp.ok) {
                const d = await resp.json();
                if (d.data?.destination?.city) {
                    cepFeedback.textContent = d.data.destination.city + '/' + d.data.destination.state;
                    cepFeedback.style.color = 'var(--color-green-600)';
                }
            }
        } catch {}
    });

    // Declared value formatting
    declaredValue.addEventListener('input', function(e) {
        let val = e.target.value.replace(/[^\d]/g, '');
        if (val) {
            val = (parseInt(val) / 100).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        e.target.value = val;
        declaredValueCents.value = val ? Math.round(parseFloat(val.replace('.', '').replace(',', '.')) * 100) : '0';
    });

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const cep = zipInput.value.replace(/\D/g, '');
        if (cep.length !== 8) {
            showError('Informe um CEP valido com 8 digitos.');
            return;
        }

        const selectedPreset = presetGroup.querySelector('.option.selected');
        let weight = selectedPreset && selectedPreset.dataset.weight !== '0'
            ? parseInt(selectedPreset.dataset.weight)
            : parseInt(weightInput.value) || 0;
        let length = selectedPreset && selectedPreset.dataset.length !== '0'
            ? parseFloat(selectedPreset.dataset.length)
            : parseFloat(lengthInput.value) || 0;
        let width = selectedPreset && selectedPreset.dataset.width !== '0'
            ? parseFloat(selectedPreset.dataset.width)
            : parseFloat(widthInput.value) || 0;
        let height = selectedPreset && selectedPreset.dataset.height !== '0'
            ? parseFloat(selectedPreset.dataset.height)
            : parseFloat(heightInput.value) || 0;

        if (!weight || weight <= 0) {
            showError('Informe o peso do pacote.');
            return;
        }
        if (!length || length <= 0 || !width || width <= 0 || !height || height <= 0) {
            showError('Informe as dimensoes do pacote.');
            return;
        }

        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        try {
            const response = await fetch('/api/v1/freight/calculate/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                },
                body: JSON.stringify({
                    destination_zip_code: cep,
                    weight_grams: weight,
                    length_cm: String(length),
                    width_cm: String(width),
                    height_cm: String(height),
                    declared_value_cents: parseInt(declaredValueCents.value) || 0,
                }),
            });

            const data = await response.json();

            if (response.ok) {
                lastResult = data.data;
                showResult(data.data);
            } else {
                const msg = data.error?.message || 'Erro ao calcular frete.';
                if (data.error?.field_errors) {
                    const fields = Object.values(data.error.field_errors).flat().join(' ');
                    showError(fields || msg);
                } else {
                    showError(msg);
                }
            }
        } catch (err) {
            if (!navigator.onLine) {
                showError('Sem conexao. Verifique sua internet.');
            } else {
                showError('Erro de conexao. Tente novamente.');
            }
        } finally {
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        }
    });

    function showResult(data) {
        const dest = data.destination;
        if (dest?.city) {
            destinationInfo.textContent = 'Destino: ' + dest.city + '/' + dest.state + ' — CEP ' + (dest.zip_code || '').replace(/(\d{5})(\d{3})/, '$1-$2');
        } else {
            destinationInfo.textContent = 'CEP: ' + (dest.zip_code || '').replace(/(\d{5})(\d{3})/, '$1-$2');
        }

        optionsContainer.innerHTML = '';

        data.options.forEach(function(opt) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.marginBottom = '0';

            let badge = '';
            if (!opt.official && opt.official !== undefined) {
                badge = '<span style="display: inline-block; font-size: var(--text-xs); font-weight: 600; color: #92400e; background: rgba(245,158,11,0.15); padding: 2px 8px; border-radius: 4px; margin-bottom: var(--space-2);">Valor estimado</span>';
            }

            let priceHtml = '';
            if (opt.error) {
                priceHtml = '<p style="color: var(--color-danger);">' + opt.error + '</p>';
            } else {
                priceHtml = '<div class="success-amount" style="font-size: var(--text-lg);">' + opt.formatted_price + '</div>';
            }

            let deadline = '';
            if (opt.delivery_days) {
                deadline = '<p style="font-size: var(--text-sm); color: var(--color-gray-500);">Prazo estimado: ' + opt.delivery_days + ' dias uteis</p>';
            }

            card.innerHTML = badge +
                '<h3 style="font-size: var(--text-lg); font-weight: 700; color: var(--color-navy-900); margin-bottom: var(--space-2);">' +
                opt.service_name + '</h3>' +
                priceHtml + deadline +
                '<button type="button" class="btn-whatsapp" style="margin-top: var(--space-3); padding: var(--space-2) var(--space-4); font-size: var(--text-sm);" ' +
                'onclick="navigator.clipboard.writeText(\'' + opt.service_name + ': ' + (opt.formatted_price || 'Indisponivel') + ' — prazo estimado de ' + (opt.delivery_days || '?') + ' dias uteis.\')' +
                '.then(function() { showToast(\'Copiado!\', \'success\'); })' +
                '.catch(function() { showToast(\'Erro ao copiar\', \'error\'); })">' +
                'Copiar valor</button>';

            optionsContainer.appendChild(card);
        });

        form.style.display = 'none';
        resultArea.style.display = 'block';
    }

    copySummaryBtn.addEventListener('click', function() {
        if (!lastResult) return;
        const dest = lastResult.destination;
        let text = 'Frete para o CEP ' + (dest.zip_code || '').replace(/(\d{5})(\d{3})/, '$1-$2');
        if (dest?.city) text += ' (' + dest.city + '/' + dest.state + ')';
        text += ':\n\n';

        lastResult.options.forEach(function(opt) {
            text += opt.service_name + ': ' + (opt.formatted_price || 'Indisponivel');
            if (opt.delivery_days) text += ' — ate ' + opt.delivery_days + ' dias uteis';
            if (!opt.official && opt.official !== undefined) text += ' (estimado)';
            text += '\n';
        });

        navigator.clipboard.writeText(text)
            .then(function() { showToast('Resumo copiado!', 'success'); })
            .catch(function() { showToast('Erro ao copiar', 'error'); });
    });

    recalculateBtn.addEventListener('click', function() {
        form.style.display = 'block';
        resultArea.style.display = 'none';
        errorDiv.style.display = 'none';
        lastResult = null;
    });

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'flex';
    }

    function hideError() {
        errorDiv.style.display = 'none';
    }
});
</script>
{% endblock %}

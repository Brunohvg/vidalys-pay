{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#071B4A">
    <title>Acessar — Vidalys Pay</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            min-height: 100vh;
            min-height: 100dvh;
        }
        .confirm-card {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-8) var(--space-6);
            box-shadow: var(--shadow-md);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .confirm-icon {
            width: 72px;
            height: 72px;
            background: var(--vidalys-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-5);
            font-size: 32px;
            color: var(--color-white);
        }
        .confirm-name {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--vidalys-navy);
            margin-bottom: var(--space-2);
        }
        .confirm-hint {
            font-size: var(--text-sm);
            color: var(--color-gray-500);
            margin-bottom: var(--space-8);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="confirm-card">
        <div class="confirm-icon">&#128274;</div>
        <h1 class="confirm-name">Olá, {{ seller_name }}</h1>
        <p class="confirm-hint">Seu acesso ao Vidalys Pay está pronto.<br>Toque no botão abaixo para entrar.</p>

        <form method="post" action="{% url 'sellers:confirm_activation' token=token %}">
            {% csrf_token %}
            <button type="submit" class="btn-primary">Entrar no Vidalys Pay</button>
        </form>
    </div>
</body>
</html>

{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — Vidalys Pay</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <style>
        .admin-header {
            background: var(--vidalys-navy);
            color: var(--color-white);
            padding: var(--space-4) var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            flex-wrap: wrap;
        }
        .admin-header__brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            text-decoration: none;
            color: var(--color-white);
        }
        .admin-header__brand img {
            width: 32px;
            height: 32px;
        }
        .admin-header__brand span {
            font-weight: 700;
            font-size: var(--text-lg);
        }
        .admin-header__actions {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .admin-header__user {
            font-size: var(--text-sm);
            opacity: 0.8;
        }
        .btn-logout {
            background: rgba(255,255,255,0.12);
            color: var(--color-white);
            border: 1px solid rgba(255,255,255,0.2);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.2);
        }

        .admin-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-4);
        }

        .admin-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--vidalys-navy);
            margin-bottom: var(--space-6);
        }

        .card-form {
            background: var(--color-white);
            border-radius: var(--radius-md);
            padding: var(--space-6);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-8);
            border: 1px solid var(--color-gray-200);
        }
        .card-form h2 {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--vidalys-navy);
            margin-bottom: var(--space-5);
        }
        .form-row {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        .form-group label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--color-gray-600);
            margin-bottom: var(--space-1);
        }
        .form-group input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            border: 1px solid var(--color-gray-300);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--vidalys-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 255, 0.12);
        }
        .btn-primary {
            background: var(--vidalys-blue);
            color: var(--color-white);
            border: none;
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-sm {
            padding: var(--space-1) var(--space-3);
            font-size: var(--text-xs);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-gray-300);
            background: var(--color-white);
            color: var(--color-gray-700);
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 500;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-sm:hover {
            border-color: var(--vidalys-blue);
            color: var(--vidalys-blue);
        }
        .btn-sm--danger:hover {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }
        .btn-sm--success {
            background: var(--color-success);
            color: var(--color-white);
            border-color: var(--color-success);
        }
        .btn-sm--success:hover {
            background: #00a87e;
        }

        .seller-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-gray-200);
        }
        .seller-table th,
        .seller-table td {
            padding: var(--space-3) var(--space-4);
            text-align: left;
            font-size: var(--text-sm);
            border-bottom: 1px solid var(--color-gray-100);
        }
        .seller-table th {
            background: var(--color-gray-50);
            font-weight: 600;
            color: var(--color-gray-600);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .seller-table td {
            color: var(--color-gray-700);
            vertical-align: middle;
        }
        .seller-table tr:last-child td {
            border-bottom: none;
        }
        .seller-table tr:hover td {
            background: var(--vidalys-surface);
        }

        .badge {
            display: inline-block;
            padding: 2px var(--space-2);
            border-radius: 9999px;
            font-size: var(--text-xs);
            font-weight: 600;
        }
        .badge--active {
            background: #d1fae5;
            color: #065f46;
        }
        .badge--inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .invitation-link {
            font-family: monospace;
            font-size: var(--text-xs);
            color: var(--vidalys-blue);
            word-break: break-all;
        }
        .invitation-cell {
            max-width: 280px;
            overflow: hidden;
        }

        .actions-cell {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: var(--space-12) var(--space-4);
            color: var(--color-gray-400);
            font-size: var(--text-sm);
        }

        .alert {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            margin-bottom: var(--space-4);
            font-weight: 500;
        }
        .alert--error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .alert--success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        @media (max-width: 768px) {
            .seller-table {
                font-size: var(--text-xs);
            }
            .seller-table th,
            .seller-table td {
                padding: var(--space-2) var(--space-3);
            }
            .invitation-cell {
                max-width: 160px;
            }
            .admin-header {
                padding: var(--space-3) var(--space-4);
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="{% url 'admin_panel:dashboard' %}" class="admin-header__brand">
            <img src="{% static 'brand/logo-symbol.svg' %}" alt="" width="32" height="32">
            <span>Painel Admin</span>
        </a>
        <div class="admin-header__actions">
            <span class="admin-header__user">{{ request.user.username }}</span>
            <form method="post" action="{% url 'admin:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Sair</button>
            </form>
        </div>
    </header>

    <main class="admin-main">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert--{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>

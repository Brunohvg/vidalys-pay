{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#071B4A">
    <title>Painel — Vidalys Pay</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body class="admin-body">
    <header class="header">
        <a href="{% url 'admin_panel:dashboard' %}" class="header__logo">
            <img src="{% static 'brand/logo-symbol.svg' %}" alt="Vidalys Pay" class="header__logo-icon" width="36" height="36">
            <span class="header__logo-text">Painel</span>
        </a>
        <form method="post" action="{% url 'admin:logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:var(--color-gray-400);font-size:var(--text-sm);cursor:pointer;font-family:var(--font-sans);padding:var(--space-2) var(--space-3);">Sair</button>
        </form>
    </header>

    {% block content %}{% endblock %}

    {% if messages %}
        <div style="position:fixed;bottom:var(--space-5);left:50%;transform:translateX(-50%);z-index:var(--z-toast);max-width:calc(100% - 32px);">
            {% for message in messages %}
                <div class="toast show{% if message.tags == 'error' %} toast--error{% elif message.tags == 'success' %} toast--success{% endif %}" style="position:static;transform:none;opacity:1;margin-top:var(--space-2);">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>

{% load static %}
<aside class="admin-sidebar" id="sidebar" aria-label="Navegação">
    <div class="admin-sidebar__brand">
        <a href="{% url 'admin_panel:dashboard' %}">
            <img src="{% static 'brand/logo-symbol.svg' %}" alt="" width="32" height="32">
            <div>
                <div class="admin-sidebar__brand-text">Vidalys Pay</div>
                <div class="admin-sidebar__brand-sub">Painel</div>
            </div>
        </a>
    </div>

    <nav class="admin-sidebar__nav">
        <a href="{% url 'admin_panel:dashboard' %}" class="admin-sidebar__link{% if active_page == 'dashboard' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Visão geral
        </a>

        <a href="{% url 'admin_panel:create_link_standalone' %}" class="admin-sidebar__link admin-sidebar__link--primary{% if active_page == 'create_link' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Criar link
        </a>
        <a href="{% url 'boletos:manager_create' %}" class="admin-sidebar__link{% if active_page == 'boletos' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3h16v18H4z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>
            Criar boleto
        </a>

        <div class="admin-sidebar__section">Gestão</div>

        <a href="{% url 'admin_panel:seller_list' %}" class="admin-sidebar__link{% if active_page == 'sellers' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
            Vendedores
        </a>

        <a href="{% url 'admin_panel:create_seller_page' %}" class="admin-sidebar__link{% if active_page == 'create_seller' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Criar vendedor
        </a>

        <div class="admin-sidebar__section">Sistema</div>

        <a href="{% url 'admin_panel:settings_page' %}" class="admin-sidebar__link{% if active_page == 'settings' %} active{% endif %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
            Configurações
        </a>
    </nav>

    <div class="admin-sidebar__footer">
        <div class="admin-sidebar__user"><div class="admin-sidebar__avatar">{{ user.username|slice:":1"|upper }}</div><div><div class="admin-sidebar__user-name">{{ user.username }}</div><small class="admin-sidebar__user-email">{{ user.email }}</small></div></div>
        <form method="post" action="{% url 'admin_panel:logout' %}">
            {% csrf_token %}
            <button class="admin-sidebar__logout">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </form>
    </div>
</aside>

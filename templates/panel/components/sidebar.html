{% load static %}
<aside class="panel-sidebar" id="panelSidebar" role="navigation" aria-label="Navegação principal">
    <div class="panel-sidebar__brand">
        <a href="{% url 'admin_panel:dashboard' %}" class="panel-sidebar__logo">
            <img src="{% static 'brand/logo-symbol.svg' %}" alt="" width="36" height="36" class="panel-sidebar__logo-icon">
            <div>
                <span class="panel-sidebar__logo-text">Vidalys Pay</span>
                <span class="panel-sidebar__logo-tag">Pagamentos</span>
            </div>
        </a>
    </div>

    <nav class="panel-sidebar__nav">
        <span class="panel-sidebar__section">Principal</span>

        <a href="{% url 'admin_panel:dashboard' %}"
           class="panel-sidebar__link{% if active_page == 'dashboard' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Visão geral
        </a>

        <a href="{% url 'admin_panel:create_link_standalone' %}"
           class="panel-sidebar__link panel-sidebar__link--primary{% if active_page == 'create_link' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Criar link
        </a>

        <span class="panel-sidebar__section">Gestão</span>

        <a href="{% url 'admin_panel:seller_list' %}"
           class="panel-sidebar__link{% if active_page == 'sellers' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Vendedores
        </a>

        <a href="{% url 'admin_panel:create_seller_page' %}"
           class="panel-sidebar__link{% if active_page == 'create_seller' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Criar vendedor
        </a>

        <span class="panel-sidebar__section">Sistema</span>

        <a href="{% url 'admin_panel:settings_page' %}"
           class="panel-sidebar__link{% if active_page == 'settings' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Configurações
        </a>
    </nav>

    <div class="panel-sidebar__footer">
        <div class="panel-sidebar__user">
            <span class="panel-sidebar__user-name">{{ user.username }}</span>
            <span class="panel-sidebar__user-email">{{ user.email }}</span>
        </div>
        <form method="post" action="{% url 'admin_panel:logout' %}">
            {% csrf_token %}
            <button type="submit" class="panel-sidebar__logout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sair
            </button>
        </form>
    </div>
</aside>

{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="theme-color" content="#071B4A">
    <title>Acessar — Vidalys Pay</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicons/favicon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'panel/css/panel.css' %}">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-card__brand">
                <img src="{% static 'brand/logo-symbol.svg' %}" alt="" width="36" height="36">
                <span>Vidalys Pay</span>
            </div>

            <h1 class="login-card__title">Acessar painel</h1>
            <p class="login-card__desc">Gerencie vendedores e links de pagamento.</p>

            {% if error %}
            <div class="login-card__error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" id="loginForm">
                {% csrf_token %}
                <div class="field">
                    <label class="field__label" for="username">Usuário ou e-mail</label>
                    <input type="text" id="username" name="username" class="field__input"
                           placeholder="seu@email.com" required autocomplete="username" autocapitalize="none"
                           value="{{ username|default:'' }}">
                </div>
                <div class="field">
                    <label class="field__label" for="password">Senha</label>
                    <div class="field--password">
                        <input type="password" id="password" name="password" class="field__input"
                               placeholder="Sua senha" required autocomplete="current-password">
                        <button type="button" class="field__toggle" id="togglePw" aria-label="Mostrar senha" tabindex="-1">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn--primary btn--lg" id="loginBtn">
                    <span class="btn__text">Entrar</span>
                    <span class="btn__spinner"></span>
                </button>
            </form>

            <p class="login-card__footer">Vidalys Pay</p>
        </div>
    </div>

    <script>
    document.getElementById('togglePw').addEventListener('click',function(){
        var p=document.getElementById('password');
        p.type=p.type==='password'?'text':'password';
    });
    document.getElementById('loginForm').addEventListener('submit',function(){
        var b=document.getElementById('loginBtn');
        b.classList.add('btn--loading');b.disabled=true;
    });
    </script>
</body>
</html>

{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071B4A">
    <title>Acessar painel — Vidalys Pay</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicons/favicon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'panel/css/panel.css' %}">
</head>
<body class="panel-login-body">
    <div class="panel-login">
        <div class="panel-login__brand">
            <img src="{% static 'brand/logo-symbol.svg' %}" alt="Vidalys Pay" width="44" height="44">
            <span>Vidalys Pay</span>
        </div>

        <div class="panel-login__card">
            <h1 class="panel-login__title">Acesse o painel</h1>
            <p class="panel-login__desc">Gerencie vendedores e links de pagamento em um só lugar.</p>

            {% if error %}
            <div class="panel-login__error">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="panel-login__form" id="loginForm">
                {% csrf_token %}

                <div class="panel-field">
                    <label class="panel-field__label" for="username">Usuário ou e-mail</label>
                    <input type="text" id="username" name="username" class="panel-field__input"
                           placeholder="seu@email.com" required autocomplete="username" autocapitalize="none"
                           value="{{ username|default:'' }}">
                </div>

                <div class="panel-field">
                    <label class="panel-field__label" for="password">Senha</label>
                    <div class="panel-field__password">
                        <input type="password" id="password" name="password" class="panel-field__input"
                               placeholder="Sua senha" required autocomplete="current-password">
                        <button type="button" class="panel-field__toggle-pw" id="togglePassword"
                                aria-label="Mostrar senha" tabindex="-1">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="panel-btn panel-btn--primary panel-login__btn" id="loginBtn">
                    <span class="panel-btn__text">Entrar</span>
                    <span class="panel-btn__spinner"></span>
                </button>
            </form>
        </div>

        <p class="panel-login__version">Vidalys Pay v1.0</p>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var toggleBtn = document.getElementById('togglePassword');
        var passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', function() {
            var isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.setAttribute('aria-label', isPass ? 'Ocultar senha' : 'Mostrar senha');
        });

        var form = document.getElementById('loginForm');
        var btn = document.getElementById('loginBtn');
        form.addEventListener('submit', function() {
            btn.classList.add('panel-btn--loading');
            btn.disabled = true;
        });
    });
    </script>
</body>
</html>

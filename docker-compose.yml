version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    stop_grace_period: 2m
    env_file:
      - .env
    environment:
      - 'DJANGO_SETTINGS_MODULE=config.settings.production'
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8000/health/'
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - coolify

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: 'python manage.py run_outbox_worker'
    restart: always
    stop_grace_period: 5m
    env_file:
      - .env
    environment:
      - 'LOG_LEVEL=${LOG_LEVEL:-INFO}'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    networks:
      - coolify

networks:
  coolify:
    external: true

version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/docker/entrypoint-web.sh"]
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "${GUNICORN_WORKERS:-3}", "--timeout", "${GUNICORN_TIMEOUT:-60}"]
    restart: always
    stop_grace_period: 2m
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://localhost:8000/health/ || exit 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - coolify

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/docker/entrypoint-worker.sh"]
    command: ["python", "manage.py", "run_outbox_worker"]
    restart: always
    stop_grace_period: 5m
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    networks:
      - coolify

networks:
  coolify:
    external: true
